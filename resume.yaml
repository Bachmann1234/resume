talks:
  - title: "Transitioning from developing software to developing people: A firsthand experience"
    venue: PyCon 2020
    description: In this talk I intend to talk specifically about the role of a manager of a single team. I will go over the types of problems a manager is responsible for and discuss the value a good manager can bring to a team/organization. I will help attendees understand the perspective of their current manager and help them decide if management is something they would be interested in trying out themselves.
  - title: "Better Testing Less Code: Property Based Testing With Python"
    venue: PyCon 2016, QCon 2017
    description: Standard unit tests have developers test specific inputs and outputs. This works, but often what breaks code are the cases we did not think about. Property based testing has developers define properties of output and has the computer explore the possible inputs to verify these properties. This talk will introduce property based testing and provide real world examples and patterns.
  - title: Diff Cover
    venue: PyCon lightning talk 2015
    description: Diff Cover is a package I maintain which allows teams to improve test coverage and code quality over time by running tools over diffs rather than the entire project. It is currently downloaded over fifty-five thousand times per day. In this PyCon lightning talk I introduce the library by using it to assist Batman with his Batputer.

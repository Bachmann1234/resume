name: Build résumé

# resume.yaml is the single source of truth. On every push to main this builds
# both outputs and publishes them to a rolling "latest" release so the
# mattbachmann.dev portfolio can fetch them at deploy time:
#   - build/cv.pdf       the LaTeX résumé
#   - build/resume.json  normalized content for the website's résumé page
#
# Stable download URLs:
#   https://github.com/Bachmann1234/resume/releases/download/latest/cv.pdf
#   https://github.com/Bachmann1234/resume/releases/download/latest/resume.json

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Run JS actions on Node 24 (Node 20 is deprecated on GitHub runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Render the .tex templates and emit resume.json. No TeX needed for this
      # step — the LaTeX compile happens in the container action below.
      - name: Render LaTeX + resume.json
        run: python build.py --no-pdf

      # Compiles both résumés with lualatex inside a full TeX Live container, so
      # fontspec and the Source Sans Pro fonts are available. Outputs cv.pdf
      # (modern, site-facing) and cv-ats.pdf (plain, ATS).
      - name: Compile PDFs
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: build
          root_file: |
            cv.tex
            cv-ats.tex
          latexmk_use_lualatex: true

      - name: Publish to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest résumé build
          body: Auto-built from resume.yaml. Assets are regenerated on every push to main.
          files: |
            build/cv.pdf
            build/cv-ats.pdf
            build/resume.json
